[general]
min_segment_len = 8
entropy_threshold = 3.5
patterns = ["uuid", "hash", "numid", "timestamp", "epoch", "base64", "mongo", "ulid", "short_token", "entropy"]

[normalize_params]
always_normalize = []
never_normalize = ["category_items_size", "channel", "country", "items_page", "items_size", "latitude", "longitude", "state", "utm_campaign", "utm_medium", "utm_source"]

[structural]
literal_segments = ["api", "graphql", "health", "status", "favicon.ico", "robots.txt"]
pattern_segments = []
